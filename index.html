<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ajouter un Examen</title>
</head>
<body>
  <h1>Créer un nouvel examen</h1>
  <form id="form-examen">
    <label for="nom">Nom de l'examen :</label>
    <input type="text" id="nom" name="nom" required><br><br>
    <label for="duree">Durée (minutes) :</label>
    <input type="number" id="duree" name="duree" required><br><br>
    <label for="description">Description :</label>
    <textarea id="description" name="description" required></textarea><br><br>
    <label for="proprietaire">Nom du propriétaire :</label>
    <input type="text" id="proprietaire" name="proprietaire" required><br><br>
    <button type="submit">Ajouter l'examen</button>
  </form>
  <script src="script.js"></script>
</body>
</html>
