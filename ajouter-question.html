<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter une question</title>
</head>
<body>
     <h1>Ajouter une question à un examen</h1> 
    <form id="form-question">

        <input type="text" id="proprietaire" placeholder="Nom du propriétaire"></br>
        
        <input type="text" id="examen" placeholder="Nom du examen"></br>
    
        
        <h3>Enonce du question:</h3>
        <textarea id="enonce">Enonce de question :</textarea><br>
        
        
        <input type="text" id="duree" placeholder="Duree d examen"><br>
        <input type="text" id="points" placeholder="Note d examen"><br>
    

        <h3>Propositions de reponces:</h3><br>
         <button id="add-proposition" type="submit">Ajouter proposition</button><br>
        <div id="propositions"> </div> 
    
        <button type="submit">Ajouter la question</button> 
    </form> 
    <script src="ajouter-question.js"></script> 
</body>
</html>
